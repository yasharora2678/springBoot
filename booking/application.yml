spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: postgres
    password: yourpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Google OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID
            client-secret: YOUR_GOOGLE_CLIENT_SECRET
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/auth/oauth2/callback/{registrationId}"

app:
  jwt:
    secret: your-super-secret-key-must-be-at-least-256-bits-long-replace-this
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-ms: 604800000    # 7 days

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
